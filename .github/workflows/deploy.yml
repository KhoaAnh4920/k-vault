name: Deploy K-Vault (Backend & Worker)

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "apps/backend/**"
      - "apps/worker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "ecosystem.config.js"

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          pnpm install

      - name: Build Backend & Worker
        run: |
          pnpm --filter kvault-backend build
          pnpm --filter kvault-worker build

      - name: Inject Environment Variables
        run: |
          cp ~/kvault-secrets/.env.backend apps/backend/.env
          cp ~/kvault-secrets/.env.worker apps/worker/.env

      - name: Start or Reload PM2 Processes
        env:
          RUNNER_TRACKING_ID: ""
        run: |
          pm2 startOrReload ecosystem.config.js
          pm2 save
